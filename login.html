<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clinic Login</title>
  <link rel="stylesheet" href="login_style.css">
</head>
<center>
<body>

  <div class="login-container">
  <img src="login_logo.png" width="100%" height="180px">
    <h2>Staff Login</h2>
	<!-- login.html -->

<!-- Error message container (initially hidden) -->
<div id="errorMessage"
     style="
       display: none;
       color: #b30000;
       background: #fff0f0;
       padding: 10px;
       border: 1px solid #ffcccc;
       border-radius: 5px;
       margin-bottom: 15px;
     ">
</div>


    <form action="login.php" method="POST">
      <label>Staff ID:</label>
      <input type="text" id="staff_id" name="staff_id" placeholder="Enter your staff ID" required>
	  <br><br>

<div>
      <label>Password:</label>
      <input type="password" id="password" name="password" placeholder="Enter your password" required>
	  <span class="toggle-password" onclick="togglePassword()"></span>
</div>
	  <br><br>

      <button type="submit">Login</button>
    </form>
  </div>
  
<!-- Script to read the error flag and show the box -->
<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get('error');
  if (code) {
    const box = document.getElementById('errorMessage');
    // Map codes to messages
    const messages = {
      id:   "🔍 Staff ID not found. Please check and try again.",
      pass: "🔒 Incorrect password. Please try again."
    };
    box.textContent = messages[code] || "⚠️ An unexpected error occurred.";
    box.style.display = 'block';
  }
</script>
  
</body>
</center>
</html>
